<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="50%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="56" x2="1200" y2="56"/>
    <line x1="0" y1="112" x2="1200" y2="112"/>
    <line x1="0" y1="168" x2="1200" y2="168"/>
    <line x1="0" y1="224" x2="1200" y2="224"/>
    <line x1="150" y1="0" x2="150" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="750" y1="0" x2="750" y2="280"/>
    <line x1="900" y1="0" x2="900" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
  </g>

  <!-- Candlestick chart decoration (right side) -->
  <g opacity="0.15" stroke="#3b82f6" stroke-width="1.5">
    <!-- Candle wicks -->
    <line x1="900" y1="80" x2="900" y2="200"/>
    <line x1="940" y1="60" x2="940" y2="180"/>
    <line x1="980" y1="90" x2="980" y2="210"/>
    <line x1="1020" y1="50" x2="1020" y2="170"/>
    <line x1="1060" y1="70" x2="1060" y2="190"/>
    <line x1="1100" y1="40" x2="1100" y2="160"/>
    <line x1="1140" y1="55" x2="1140" y2="175"/>
  </g>
  <!-- Green candles -->
  <g opacity="0.2" fill="#22c55e">
    <rect x="892" y="120" width="16" height="60" rx="2"/>
    <rect x="972" y="130" width="16" height="55" rx="2"/>
    <rect x="1052" y="110" width="16" height="65" rx="2"/>
    <rect x="1132" y="90" width="16" height="70" rx="2"/>
  </g>
  <!-- Red candles -->
  <g opacity="0.2" fill="#ef4444">
    <rect x="932" y="100" width="16" height="65" rx="2"/>
    <rect x="1012" y="80" width="16" height="70" rx="2"/>
    <rect x="1092" y="70" width="16" height="75" rx="2"/>
  </g>

  <!-- Trend line -->
  <polyline points="890,185 930,160 970,170 1010,140 1050,150 1090,115 1130,100 1180,80"
    fill="none" stroke="#22c55e" stroke-width="2" opacity="0.25" stroke-dasharray="6,3"/>

  <!-- Left glow blob -->
  <ellipse cx="80" cy="140" rx="120" ry="80" fill="#3b82f6" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="277" width="1200" height="3" fill="url(#accent)"/>

  <!-- Icon / logo mark -->
  <g transform="translate(90, 100)" filter="url(#softglow)">
    <!-- Hex border -->
    <polygon points="50,0 100,25 100,75 50,100 0,75 0,25"
      fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <!-- Inner letter F -->
    <text x="50" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="62"
      font-weight="900" text-anchor="middle" fill="url(#titleGrad)" opacity="0.95">F</text>
  </g>

  <!-- Main title -->
  <text x="220" y="138"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="900" letter-spacing="-1"
    fill="url(#titleGrad)" filter="url(#glow)">FinanceGPT</text>

  <!-- Subtitle -->
  <text x="222" y="175"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="20" font-weight="400" letter-spacing="0.5"
    fill="#94a3b8">Built from scratch. No APIs. Custom transformer + 4-agent reasoning.</text>

  <!-- Pill tags -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500">
    <!-- PyTorch pill -->
    <rect x="222" y="200" width="90" height="26" rx="13" fill="#EE4C2C" opacity="0.15"/>
    <rect x="222" y="200" width="90" height="26" rx="13" fill="none" stroke="#EE4C2C" stroke-width="1" opacity="0.5"/>
    <text x="267" y="217" text-anchor="middle" fill="#EE4C2C" opacity="0.9">PyTorch</text>

    <!-- Python pill -->
    <rect x="322" y="200" width="80" height="26" rx="13" fill="#3776AB" opacity="0.15"/>
    <rect x="322" y="200" width="80" height="26" rx="13" fill="none" stroke="#3776AB" stroke-width="1" opacity="0.5"/>
    <text x="362" y="217" text-anchor="middle" fill="#3776AB" opacity="0.9">Python</text>

    <!-- 10M params pill -->
    <rect x="412" y="200" width="110" height="26" rx="13" fill="#8b5cf6" opacity="0.15"/>
    <rect x="412" y="200" width="110" height="26" rx="13" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <text x="467" y="217" text-anchor="middle" fill="#8b5cf6" opacity="0.9">~10M params</text>

    <!-- 31 Domains pill -->
    <rect x="532" y="200" width="105" height="26" rx="13" fill="#22c55e" opacity="0.15"/>
    <rect x="532" y="200" width="105" height="26" rx="13" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <text x="584" y="217" text-anchor="middle" fill="#22c55e" opacity="0.9">31 Domains</text>

    <!-- No APIs pill -->
    <rect x="647" y="200" width="90" height="26" rx="13" fill="#f97316" opacity="0.15"/>
    <rect x="647" y="200" width="90" height="26" rx="13" fill="none" stroke="#f97316" stroke-width="1" opacity="0.5"/>
    <text x="692" y="217" text-anchor="middle" fill="#f97316" opacity="0.9">No APIs</text>
  </g>
</svg>
